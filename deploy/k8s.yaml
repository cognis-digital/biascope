apiVersion: apps/v1
kind: Deployment
metadata: { name: biascope, labels: { app: biascope } }
spec:
  replicas: 1
  selector: { matchLabels: { app: biascope } }
  template:
    metadata: { labels: { app: biascope } }
    spec:
      containers:
        - name: biascope
          image: ghcr.io/cognis-digital/biascope:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: biascope }
spec:
  selector: { app: biascope }
  ports: [{ port: 80, targetPort: 8000 }]
